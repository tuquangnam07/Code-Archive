<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CODE ARCHIVE - Thư Viện Lịch Sử Code Cá Nhân</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-code-branch"></i>
                <h1>CODE ARCHIVE</h1>
            </div>
            
            <nav class="nav-menu">
                <a href="#" class="nav-item active" data-page="dashboard">
                    <i class="fas fa-chart-pie"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#" class="nav-item" data-page="projects">
                    <i class="fas fa-code"></i>
                    <span>Projects</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="stats-mini">
                    <div class="stat-item">
                        <span class="stat-label">Total Projects</span>
                        <span class="stat-value" id="totalProjectsMini">0</span>
                    </div>
                </div>
                <p class="footer-note">© 2026 Code Archive</p>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="header">
                <button class="mobile-menu-btn">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="search-section">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="Search projects...">
                    </div>
                    
                    <div class="filter-badge" id="activeFilterBadge"></div>
                    
                    <button class="filter-toggle-btn" id="filterToggleBtn">
                        <i class="fas fa-filter"></i>
                        <span>Filters</span>
                    </button>
                </div>
            </header>

            <!-- Filter Panel -->
            <div class="filter-panel" id="filterPanel">
                <div class="filter-group">
                    <h3>Status</h3>
                    <div class="filter-options">
                        <label class="filter-checkbox">
                            <input type="checkbox" value="Working" class="filter-status"> Working
                        </label>
                        <label class="filter-checkbox">
                            <input type="checkbox" value="Broken" class="filter-status"> Broken
                        </label>
                        <label class="filter-checkbox">
                            <input type="checkbox" value="In Progress" class="filter-status"> In Progress
                        </label>
                        <label class="filter-checkbox">
                            <input type="checkbox" value="Deprecated" class="filter-status"> Deprecated
                        </label>
                    </div>
                </div>
                
                <div class="filter-group">
                    <h3>Language</h3>
                    <div class="filter-options" id="languageFilters">
                        <!-- Sẽ được thêm bằng JavaScript -->
                    </div>
                </div>
                
                <div class="filter-group">
                    <h3>Year</h3>
                    <select id="yearFilter" class="filter-select">
                        <option value="">All Years</option>
                    </select>
                </div>
                
                <div class="filter-actions">
                    <button class="btn btn-primary" id="applyFilters">Apply Filters</button>
                    <button class="btn btn-secondary" id="clearFilters">Clear</button>
                </div>
            </div>

            <!-- Content Area -->
            <div class="content-area" id="contentArea">
                <!-- Nội dung sẽ được render bằng JavaScript -->
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
